<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Resume Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    #dropzone { border: 2px dashed #999; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; }
    #dropzone.drag { border-color: #333; background: #f5f5f5; }
    #fileInfo { margin-top: 12px; font-size: 0.9rem; color: #555; }
    button { margin-top: 16px; padding: 10px 18px; border: none; border-radius: 6px; background: #222; color: #fff; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #error { color: #b00020; margin-top: 16px; font-weight: 500; }
    #result { margin-top: 24px; padding: 16px; border-radius: 8px; background: #f0f7f0; display: none; }
    #result h2 { margin-top: 0; }
    ul { padding-left: 20px; }
    .section-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; margin: 2px; }
    .present { background: #d7f5d7; }
    .missing { background: #f5d7d7; }
  </style>
</head>
<body>
  <h1>AI Resume Analyzer</h1>
  <p>Upload a PDF or DOCX resume/CV to get a score and improvement suggestions.</p>

  <div id="dropzone">
    <p>Click to choose a file, or drag it here</p>
    <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none">
    <div id="fileInfo"></div>
  </div>

  <button id="analyzeBtn" disabled>Analyze Resume</button>

  <div id="error"></div>

  <div id="result">
    <h2>Score: <span id="scoreVal"></span>/100</h2>
    <p id="fresherNote" style="display:none; font-style: italic;"></p>
    <div id="sections"></div>
    <h3>Suggestions</h3>
    <ul id="suggestions"></ul>
  </div>

  <script>
    const MAX_FILE_SIZE_MB = 5;
    const ALLOWED_EXTENSIONS = [".pdf", ".docx"];

    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const errorEl = document.getElementById("error");
    const resultEl = document.getElementById("result");

    let selectedFile = null;

    dropzone.addEventListener("click", () => fileInput.click());

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("drag");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag");
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      errorEl.textContent = "";
      resultEl.style.display = "none";

      const nameLower = file.name.toLowerCase();
      const validExt = ALLOWED_EXTENSIONS.some(ext => nameLower.endsWith(ext));
      if (!validExt) {
        errorEl.textContent = "Unsupported file type. Please upload a .pdf or .docx file.";
        analyzeBtn.disabled = true;
        selectedFile = null;
        return;
      }

      if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
        errorEl.textContent = `File too large. Max size is ${MAX_FILE_SIZE_MB}MB.`;
        analyzeBtn.disabled = true;
        selectedFile = null;
        return;
      }

      selectedFile = file;
      fileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
      analyzeBtn.disabled = false;
    }

    analyzeBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      errorEl.textContent = "";
      resultEl.style.display = "none";
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = "Analyzing...";

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch("/analyze", { method: "POST", body: formData });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || "Something went wrong.";
          return;
        }

        document.getElementById("scoreVal").textContent = data.score;

        const fresherNote = document.getElementById("fresherNote");
        if (data.is_fresher) {
          fresherNote.style.display = "block";
          fresherNote.textContent = "Detected as a fresher/entry-level resume — experience section was not required.";
        } else {
          fresherNote.style.display = "none";
        }

        const sectionsEl = document.getElementById("sections");
        sectionsEl.innerHTML = "";
        Object.entries(data.sections_detected || {}).forEach(([name, present]) => {
          const span = document.createElement("span");
          span.className = "section-tag " + (present ? "present" : "missing");
          span.textContent = (present ? "✓ " : "✗ ") + name;
          sectionsEl.appendChild(span);
        });

        const suggestionsEl = document.getElementById("suggestions");
        suggestionsEl.innerHTML = "";
        (data.suggestions || []).forEach(s => {
          const li = document.createElement("li");
          li.textContent = s;
          suggestionsEl.appendChild(li);
        });

        resultEl.style.display = "block";
      } catch (err) {
        errorEl.textContent = "Network error — please try again.";
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = "Analyze Resume";
      }
    });
  </script>
</body>
</html>
